<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Number Adder</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f5f5f5;
            font-family: Arial, sans-serif;
        }

        .card {
            width: 500px;
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
            text-align: center;
        }

        .heading {
            font-size: 42px;
            margin-bottom: 15px;
        }

        h2 {
            margin-top: 30px;
        }

        p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .inputs {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        input {
            width: 180px;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 10px;
            font-size: 16px;
        }

        i {
            font-size: 20px;
        }

        button {
            padding: 12px 40px;
            border: none;
            border-radius: 10px;
            background: black;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="card">

        <h1 class="heading">Number Adder</h1>

        <p>
            Enter numbers below and click the button to add them together.
        </p>

        <div class="inputs">
            <input type="number" placeholder="Enter First Number" id="num1">

            <i class="fa-solid fa-plus"></i>

            <input type="number" placeholder="Enter Second Number" id="num2">
        </div>

        <button id="addButton">Add Numbers</button>
        <h2 id="result"></h2>

        <script src="script.js"></script>

    </div>

</body>

</html>
